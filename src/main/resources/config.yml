# 牌子标题。建议保留默认值，避免和旧锁数据不一致。
signs:
  lock-header: "[锁]"
  more-users-header: "[更多用户]"

# 保护范围与允许上锁的方块。
protection:
  explosions: true
  admin-bypass: true
  # 每把锁最多可以额外挂多少块 [更多用户] 牌子。
  max-more-user-signs: 4
  # 自动扩展授权牌时，按这个顺序寻找可放置位置。
  extension-placement-order:
    - NORTH
    - SOUTH
    - EAST
    - WEST
  # 可直接贴锁牌的方块列表。保留英文材质名即可。
  lockable-materials:
    - CHEST
    - TRAPPED_CHEST
